{% extends 'base.html' %}

{% block title %}
Edit - Todo List
{% endblock title %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit.css') }}">
{% endblock css %}

{% block content %}
<div class="edit-wrapper">
    <div class="edit-shell">

        <form method="POST" action="{{ url_for('tasks.edit_task', task_id=task.id) }}">
            {{ form.hidden_tag() }}

            <div class="edit-card">

                <!-- Top bar -->
                <div class="edit-topbar">
                    <!-- Back btn -->
                    <a href="{{ url_for('tasks.home') }}" class="back-btn" aria-label="Go back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12" />
                            <polyline points="12 19 5 12 12 5" />
                        </svg>
                    </a>


                    <!-- Delete btn -->
                    <button type="button" class="del-btn" aria-label="Move to recycle bin"
                        onclick="document.getElementById('delete-form').submit();">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                            <path d="M10 11v6" />
                            <path d="M14 11v6" />
                            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                        </svg>
                    </button>
                </div>

                <!-- Fields -->
                <div class="edit-body">
                    <input class="title-input" type="text" name="title" placeholder="Task title"
                        value="{{ task.title }}" required autocomplete="off" />

                    <div class="field-row">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6" />
                                <line x1="8" y1="12" x2="21" y2="12" />
                                <line x1="8" y1="18" x2="21" y2="18" />
                                <line x1="3" y1="6" x2="3.01" y2="6" />
                                <line x1="3" y1="12" x2="3.01" y2="12" />
                                <line x1="3" y1="18" x2="3.01" y2="18" />
                            </svg>
                        </span>

                        <textarea class="field-input" name="description"
                            placeholder="Add description...">{{ task.description or '' }}</textarea>
                    </div>

                    <div class="field-row">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </span>
                        
                        <input class="field-input" type="datetime-local" name="time_date"
                            value="{{ task.time_date.strftime('%Y-%m-%dT%H:%M') if task.time_date else '' }}" />
                    </div>
                </div>

                <!-- Footer -->
                <div class="edit-footer">
                    <button type="submit" class="save-btn">Save</button>
                </div>

            </div>
        </form>

        <!-- Separate delete form (soft delete → recycle bin) -->
        <form id="delete-form" method="POST" action="{{ url_for('tasks.delete_task', task_id=task.id) }}"
            style="display:none;">
            {{ form.hidden_tag() }}

        </form>

    </div>
</div>
{% endblock content %}
